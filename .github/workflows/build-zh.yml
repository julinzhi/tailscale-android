name: Build Chinese APK

on:
  push:
    branches: [main]
    paths:
      - 'android/src/main/res/values-zh-rCN/**'
      - '.github/workflows/build-zh.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: "go.mod"

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Install Android SDK components
        run: |
          ANDROID_SDK_ROOT="${ANDROID_HOME:-${ANDROID_SDK_ROOT:-$HOME/Android/Sdk}}"
          mkdir -p "$ANDROID_SDK_ROOT/cmdline-tools"
          if [ ! -d "$ANDROID_SDK_ROOT/cmdline-tools/latest" ]; then
            curl -sL "https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip" -o /tmp/cmdtools.zip
            unzip -q /tmp/cmdtools.zip -d "$ANDROID_SDK_ROOT/cmdline-tools"
            mv "$ANDROID_SDK_ROOT/cmdline-tools/cmdline-tools" "$ANDROID_SDK_ROOT/cmdline-tools/latest"
          fi
          yes | "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" \
            'platforms;android-34' \
            'extras;android;m2repository' \
            'ndk;23.1.7779620' \
            'platform-tools' \
            'build-tools;34.0.0'

      - name: Build debug APK
        run: make tailscale-debug.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: tailscale-android-zh-cn
          path: tailscale-debug.apk
